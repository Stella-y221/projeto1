<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projeto web</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/x-icon" href="imagens/image.png">
</head>

<body class="bg-violet-50">
    
    <div class="w-full mx-auto container bg-olive-5 0 ">
        <!-- inicio cabeçalho -->
        <!-- w-full - pega a largura das dose   colunas, ela é full dentro do disponivel onde ela estiver
            w-3/12 pega as tres colunas de antes meio que aloca nos espaços 
            rounded-xl - arredondar borda
            bg- troca a cor do background
            shadow-[0_50px_20px_rgba(0,0,0,0.25)] - para sombras em baixo
            z-999 - para sobrepor camadas
            md:flex-row -  deixa o site responsivo quando a tela ficar menor md- telas médias-->
        
            <div class="w-full p-4 flex items-center justify-center shadow-md ">
                <div class="w-3/12 pl-20">
                    <img src="imagens/logotipo.webp" alt="Logotipo" class="w-40">

                </div>
            <div class="w-9/12">

                <div class="w-full  flex  justify-around items-center gap-3 pr-10 ">

                    <div><a href="index.html" class="p-7 hover:bg-olive-50/50 hover:border-b-2 transition duration[2s]">Home</a>
                    </div>
                    <div><a href="#" class="p-7 hover:bg-olive-50/50 hover:border-b-2 transition duration[2s]">Quem
                            Somos</a></div>
                    <div><a href="FaleConosco.html" class="p-7 hover:bg-olive-50/50 hover:border-b-2 transition duration[2s]">Fale
                            Conosco</a></div>

                </div>


            </div>
        </div>
        <!-- Fim cabeçalho -->
        
        <!-- Inicio main  -->
        
        <div class="conteudo1 w-full flex flex-col-reverse p-2 gap-4 pt-10 ">
            <!-- Bloco contato -->
            <div class="Contato  flex flex-col gap-5 ">
                <h1 class="text-5xl font-bold">Contato</h1>
        <!-- Tirar o h- 52 depois que adicionar o mapa! -->
                <div  >
                    <p class="text-neutral-900 font-semibold mb2">
                        <i class="bi bi-whatsapp"></i> (12) X XXXX-XXXX
                    </p>
                    <p class="text-neutral-900 font-semibold">
                        <i class="bi bi-telephone"></i> (12) X XXXX-XXXX
                    </p>
                    <p class="text-neutral-900 font-semibold">
                        <i class="bi bi-envelope"></i> Entreemcontato@chanel.com
                    </p>
                    <p class="text-neutral-900 font-semibold">
                        <i class="bi bi-geo-alt"></i> Rua Não sei , n°250 - taubaté/sp
                    </p>
                </div>
            </div>
            <!-- Bloco Quem somos -->
            <div class="quemSomos w-full flex flex-col justify-center items-center gap-5  m-auto">

                <h1 class="text-5xl font-bold">Fale Conosco</h1>
                    <!-- Tirar o h- 52 depois que adicionar o mapa! -->
                <div class=" w-full flex justify-center items-center ">
                    <form class="w-200 flex flex-col justify-center items-center gap-5 shadow-[0px_0px_4px_rgba(0,0,0,0.25)] rounded-2xl p-3">

                        <div class="flex w-8/12">
                            <label for="nome" class="w-24" >Nome: </label>
                            <input type="text" class=" w-full inset-shadow-sm border border-gray-300  rounded-2xl" name="nome" id="nome">
                        </div>

                        <div class="w-full flex justify-center items-center gap-2">

                            <div class="flex ">
                                <label for="telefone" class=" w-20 ">Telefone: </label>
                                <input type="number" class=" w-8/12 border border-gray-300 rounded-2xl inset-shadow-sm "  name="telefone" id="telefone">
                            </div>

                            <div class="flex gap-2"> 
                                <label for="email">Email: </label>
                                <input type="email" class=" w-full border border-gray-300 rounded-2xl inset-shadow-sm W-20"  name="email" id="email">
                            </div>

                        </div>

                        <div class=" flex flex-col gap-2">

                            <label for="mensagem">Mensagem: </label>
                            <textarea name="mensagem" id="mensagem" rows="4" cols="4" class="inset-shadow-sm rounded-2xl border border-gray-300 w-129"></textarea>
                        </div>
                        <button type="submit" class="p-4 bg-black text-white rounded-2xl border-2 hover:bg-white hover:border-2 border-black hover:text-black transition-1s"> Enviar </button>

                    </form>

                </div>
            </div>

        </div>
        <!-- Tirar o h- 52 depois que adicionar o mapa! -->
        <div class="conteudo2 w-full h-40 p-2 flex flex-col gap-2">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d20998.65154989323!2d2.296369575095399!3d48.861424498730315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e3243fb73c7%3A0x3fb18180b14e0231!2sChanel!5e0!3m2!1spt-BR!2sbr!4v1779280196916!5m2!1spt-BR!2sbr" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        
        <!-- Final main -->
        
        <!-- inicio footer -->
        <div class="w-full p-4 flex items-center justify-center  bg-black text-white">
            <div class="w-3/12 pl-20">
                <img src="imagens/logotipoV2.png" alt="Logotipo" class="w-40">
                
            </div>
            <div class="w-6/12">
                
                <div class="w-full h-full flex  justify-around items-center gap-3 pr-10  bg-black ">
                    
                    <div><a href="#" class="p-7 hover:bg-violet-50/50 transition duration[2s]">Home</a>
                    </div>
                    <div><a href="#" class="p-7 hover:bg-violet-50/50 transition duration[2s]">Quem Somos</a></div>
                    <div><a href="#" class="p-7 hover:bg-violet-50/50  transition duration[2s]">Fale Conosco</a></div>
                    
                </div>
            </div>
            <div class="w-3/12 flex flex-col justify-center items-center gap-3 ">
                <h4>Redes Sociais</h4>
                <div class="flex  gap-10">
                    <div class="social"><a href="#"><i class="bi bi-instagram icone text-violet-50 hover:text-white text-3xl"></i></a></div>
                    <div class="social"><a href="#"><i class="bi bi-facebook icone text-violet-50 text-3xl hover:text-white"></i></a></div>
                    <div class="social"><a href="#"><i class="bi bi-twitter icone text-violet-50 text-3xl hover:text-white"></i></a></div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
